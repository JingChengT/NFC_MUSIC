<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 NFC_MUSIC</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --sub-color: #b3b3b3;
            --accent-color: #1DB954;
            --record-size: 260px;
            --progress-bg: #444;
        }

        [theme="light"] {
            --bg-color: #f5f5f5;
            --card-color: rgba(255, 255, 255, 0.8);
            --text-color: #222;
            --sub-color: #666;
            --accent-color: #1ED760;
            --progress-bg: #ddd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            transition: background 0.4s ease;
        }

        .player-card {
            background: var(--card-color);
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            width: 340px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--accent-color);
            color: white; border: none;
            font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 20;
        }

        .info h2 { margin-bottom: 8px; font-size: 1.4rem; letter-spacing: 1px; }
        .info p { color: var(--sub-color); font-size: 0.9rem; margin-bottom: 30px; }

        .record-container {
            position: relative;
            width: var(--record-size);
            height: var(--record-size);
            margin: 0 auto 40px;
        }

        .needle {
            position: absolute;
            top: -20px; right: 20px;
            width: 15px; height: 100px;
            background: #aaa; border-radius: 5px;
            transform-origin: top center;
            transform: rotate(-35deg);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .record {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #333 0%, #111 100%);
            border: 8px solid #222;
            display: flex; justify-content: center; align-items: center;
            animation: rotate 10s linear infinite;
            animation-play-state: paused;
            position: relative;
        }

        .cover {
            width: 75%; height: 75%;
            border-radius: 50%;
            background-image: url('cover.jpg');
            background-size: cover;
            background-position: center;
            border: 4px solid var(--bg-color);
            z-index: 1;
        }

        .playing .record { animation-play-state: running; }
        .playing .needle { transform: rotate(12deg); }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .progress-container { width: 85%; margin: 0 auto 25px; }
        .progress-bar {
            -webkit-appearance: none;
            width: 100%; height: 6px;
            border-radius: 10px;
            background: var(--progress-bg);
            outline: none; cursor: pointer;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--accent-color);
        }

        .time {
            display: flex; justify-content: space-between;
            color: var(--sub-color); font-size: 0.75rem; margin-top: 5px;
        }

        .btn {
            background: var(--accent-color);
            color: white; border: none;
            padding: 15px 50px; border-radius: 50px;
            font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
            min-width: 200px;
        }
    </style>
</head>
<body>

<div class="player-card" id="main-card">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️</button>

    <div class="info">
        <h2 id="title">BAN</h2>
        <p id="artist">櫻坂46</p>
    </div>

    <div class="record-container">
        <div class="needle"></div>
        <div class="record">
            <div class="cover"></div>
        </div>
    </div>

    <div class="progress-container">
        <input type="range" id="progress" class="progress-bar" value="0" min="0" max="100">
        <div class="time">
            <span id="current">0:00</span>
            <span id="total">0:00</span>
        </div>
    </div>

    <audio id="music" src="./music.mp3" preload="auto" loop></audio>
    <button class="btn" onclick="togglePlay()" id="btn-text">正在尝试预载...</button>
</div>

<script>
    const card = document.getElementById('main-card');
    const audio = document.getElementById('music');
    const btn = document.getElementById('btn-text');
    const progress = document.getElementById('progress');
    const currentTimeEl = document.getElementById('current');
    const totalTimeEl = document.getElementById('total');
    const themeBtn = document.getElementById('theme-btn');

    // 1. 自动更新总时长（元数据就绪时）
    audio.addEventListener('loadedmetadata', () => {
        totalTimeEl.innerText = formatTime(audio.duration);
        if (btn.innerText === "正在尝试预载...") {
            btn.innerText = "开启音乐";
        }
    });

    // 2. 处理网络缓冲状态
    audio.addEventListener('waiting', () => {
        if (!audio.paused) btn.innerText = "缓冲中...";
    });

    audio.addEventListener('canplay', () => {
        if (!audio.paused) btn.innerText = "暂停";
    });

    // 3. 核心播放函数
    function togglePlay() {
        if (audio.paused) {
            // 给用户即时反馈，防止连击
            btn.innerText = "正在唤醒...";
            
            audio.play().then(() => {
                card.classList.add('playing');
                btn.innerText = "暂停";
                btn.style.background = "#555";
            }).catch(e => {
                console.log("Play failed:", e);
                btn.innerText = "点击重试";
            });
        } else {
            audio.pause();
            card.classList.remove('playing');
            btn.innerText = "继续播放";
            btn.style.background = "var(--accent-color)";
        }
    }

    // 4. 主题切换
    function toggleTheme() {
        const current = document.body.getAttribute('theme') || 'dark';
        if (current === 'dark') {
            document.body.setAttribute('theme', 'light');
            themeBtn.innerText = '🌙';
        } else {
            document.body.setAttribute('theme', 'dark');
            themeBtn.innerText = '☀️';
        }
    }

    // 5. 进度条联动
    audio.addEventListener('timeupdate', () => {
        if (!isNaN(audio.duration)) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progress.value = percent;
            currentTimeEl.innerText = formatTime(audio.currentTime);
        }
    });

    progress.addEventListener('input', () => {
        const seekTime = (progress.value * audio.duration) / 100;
        audio.currentTime = seekTime;
    });

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    // 6. 移动端唤醒：用户第一次摸屏幕时就开始下载音频
    document.addEventListener('touchstart', () => {
        if (audio.readyState === 0) {
            audio.load();
            console.log("Audio load triggered by touch");
        }
    }, { once: true });
</script>

</body>
</html>
